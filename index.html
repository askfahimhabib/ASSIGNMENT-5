<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Daisy and Tailwind -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- Font Family -->
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap");
    </style>
    <style>
      * {
        font-family: "Geist", sans-serif;
      }
    </style>
    <!-- Fav Icon -->
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />
    <title>Github Issue Tracker</title>
  </head>
  <body class="bg-base-200 min-h-screen py-10">
    <header
      class="w-full max-w-md mx-auto bg-white border-0 shadow-lg rounded-lg text-center space-y-4 p-8"
    >
      <!-- Logo Image -->
      <div class="flex justify-center mb-4">
        <img src="./assets/github-logo.png" alt="" />
      </div>
      <!-- Header text -->
      <div class="space-y-2">
        <h2 class="text-3xl font-semibold">GitHub Issue Tracker</h2>
        <p class="text-gray-500">Sign in to manage your issues</p>
      </div>

      <!-- Login Form -->
      <section>
        <fieldset class="fieldset rounded-box p-4">
          <label class="label">Username</label>
          <input
            type="text"
            id="username"
            class="input w-full"
            placeholder="Enter Your username"
          />
          <label class="text-[#4A00FF] text-left">Default: admin</label>

          <label class="label">Password</label>
          <input
            type="password"
            id="password"
            class="input w-full"
            placeholder="Enter Your Password"
          />
          <label class="text-[#4A00FF] text-left">Default: admin123</label>

          <button id="login-btn" class="btn btn-primary mt-4">Login</button>
        </fieldset>
      </section>
    </header>

    <!-- Login Script -->
    <script src="./JS-Script/login.js"></script>
  </body>
</html>
